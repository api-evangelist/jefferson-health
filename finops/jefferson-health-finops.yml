    chargeClass: null
    pricingModel: Free
    notes: No developer billing. CMS-mandated free access for patient-authorized apps.
  - id: jhp-patient-access-fhir-api
    name: Jefferson Health Plans Patient Access FHIR API
    billingModel: free
    chargeCategory: Usage
    pricingModel: Free
    notes: No developer billing. Member-authorized access.
  - id: jhp-provider-directory-fhir-api
    name: Jefferson Health Plans Provider Directory FHIR API
    billingModel: free
    chargeCategory: Usage
    pricingModel: Free
    notes: Public unauthenticated; no developer billing.
  outOfScope:
  - id: clinical-services
    name: Clinical Services Billing
    rationale: Hospital and professional services billing is governed by payer contracts and Hospital Price Transparency, not a developer API meter.
    references:
    - https://www.jeffersonhealth.org/pay-my-bill/charge-description
    - https://www.jeffersonhealth.org/pay-my-bill/price-estimator
  - id: health-insurance-premiums
    name: Jefferson Health Plans Premiums
    rationale: Insurance product premiums are sold through enrollment channels and Marketplaces, not as developer-priced API consumption.

