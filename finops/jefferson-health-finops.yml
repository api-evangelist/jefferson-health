finopsFramework: '2024.0'
focus: '1.1'
info:
  title: Jefferson Health FinOps Disclosure
  description: >-
    FinOps disclosure for Jefferson Health's published API surface. Because
    Jefferson Health's CMS Interoperability and Patient Access FHIR APIs
    are free at point of use for patient-authorized apps, there is no
    consumer-facing billing surface to map to the FinOps Framework /
    FOCUS data spec. The operational cost is borne by Jefferson Health
    internally as part of regulatory compliance with CMS-9115-F and the
    21st Century Cures Act. Clinical billing (hospital and professional
    services) is governed by payer contracts, HIPAA, and the Hospital
    Price Transparency rule — not by an API monetization layer.
  created: '2026-05-23'
  modified: '2026-05-23'
provider:
  name: Jefferson Health
  url: https://www.jeffersonhealth.org/

