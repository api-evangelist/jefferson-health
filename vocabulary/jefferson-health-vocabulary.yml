name: Jefferson Health Vocabulary
description: >-
  Operational and capability vocabulary for the Jefferson Health enterprise:
  the academic hospital system (Jefferson Health / Thomas Jefferson University
  Hospital) and its sister insurance organization (Jefferson Health Plans,
  formerly Health Partners Plans). Anchored on HL7 FHIR R4, US Core, Da Vinci
  Plan-Net, CARIN Blue Button, SMART App Launch, and the CMS Interoperability
  and Patient Access Final Rule.
created: '2026-05-23'
modified: '2026-05-23'

domains:
- name: Organizations
  terms:
  - term: Jefferson Health
    description: Multi-state nonprofit academic health system based in Philadelphia, PA.
  - term: Thomas Jefferson University
    description: Academic arm of the Jefferson enterprise.
  - term: Thomas Jefferson University Hospital (TJUH)
    description: Flagship 11th Street academic medical center; FHIR endpoint host.
  - term: Jefferson Health Plans (JHP)
    description: Insurance subsidiary, formerly branded Health Partners Plans (HPP).
  - term: MyJeffersonHealth
    description: Patient-facing Epic MyChart deployment for Jefferson Health.
  - term: MyChart Central
    description: Epic feature enabling single-login MyChart access across participating health systems.

- name: Standards and Implementation Guides
  terms:
  - term: HL7 FHIR R4 (4.0.1)
    description: Healthcare data interoperability standard used at fhir.jefferson.edu.
  - term: US Core 6.1.0
    description: HL7 US Core Implementation Guide for USCDI data classes.
  - term: USCDI
    description: ONC's United States Core Data for Interoperability dataset.
  - term: SMART App Launch
    description: OAuth 2.0-based launch framework for FHIR apps.
  - term: HL7 FHIR Bulk Data Access
    description: Asynchronous group-level export protocol (ndjson).
  - term: HL7 CARIN BB
    description: CARIN Consumer Directed Payer Data Exchange (Blue Button) IG for payer Patient Access APIs.
  - term: HL7 Da Vinci PDEX Plan-Net
    description: Payer Data Exchange Plan-Net IG for provider directories.

- name: Regulations
  terms:
  - term: CMS-9115-F
    description: CMS Interoperability and Patient Access Final Rule (Patient Access API and Provider Directory API).
  - term: 21st Century Cures Act
    description: ONC information-blocking rule that mandates patient access to electronic health information via FHIR.
  - term: HIPAA
    description: Health Insurance Portability and Accountability Act privacy and security rules governing PHI.

