apis:
  - aid: jefferson-health:tjuh-fhir-r4-api
    name: Thomas Jefferson University Hospital FHIR R4 API
    tags:
      - CMS Interoperability
      - Cures Act
      - Epic
      - FHIR
      - HL7
      - Patient Access
      - R4
      - SMART on FHIR
      - US Core
      - USCDI
    humanURL: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/R4
    baseURL: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/R4
    description: >-
      The Thomas Jefferson University Hospital FHIR R4 API is Jefferson Health's CMS Interoperability and Patient Access
      (CMS-9115-F) compliant HL7 FHIR Release 4.0.1 endpoint powered by Epic's August 2025 release. It exposes 80+
      USCDI-aligned resource types — including Patient, Observation, Condition, Encounter, MedicationRequest,
      AllergyIntolerance, DiagnosticReport, DocumentReference, and Procedure — to third-party patient-access
      applications using SMART on FHIR and OAuth 2.0 with standalone-patient and EHR launch contexts, supports US Core
      6.1.0 profiles, returns XML or JSON, and offers Bulk FHIR Group export for population-level access.
    properties:
      - type: CapabilityStatement
        url: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/R4/metadata
      - type: SmartConfiguration
        url: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/R4/.well-known/smart-configuration
      - type: Authorization
        url: https://fhir.jefferson.edu/FHIRProxy/oauth2/authorize
      - type: Token
        url: https://fhir.jefferson.edu/FHIRProxy/oauth2/token
      - type: Documentation
        url: https://fhir.epic.com/Documentation
      - type: AppRegistration
        url: https://fhir.epic.com/Developer/Apps
      - type: DeveloperPortal
        url: https://fhir.epic.com/
      - type: EndpointDirectory
        url: https://open.epic.com/Endpoints/R4
      - type: ImplementationGuide
        name: HL7 US Core 6.1.0
        url: https://hl7.org/fhir/us/core/STU6.1/
      - type: ImplementationGuide
        name: HL7 SMART App Launch
        url: https://hl7.org/fhir/smart-app-launch/
      - type: ImplementationGuide
        name: HL7 FHIR Bulk Data Access
        url: https://hl7.org/fhir/uv/bulkdata/
      - type: OpenAPI
        url: openapi/jefferson-health-tjuh-fhir-r4-api-openapi.yml
      - type: SpectralRuleset
        url: rules/jefferson-health-tjuh-fhir-r4-rules.yml
  - aid: jefferson-health:tjuh-fhir-dstu2-api
    name: Thomas Jefferson University Hospital FHIR DSTU2 API
    tags:
      - DSTU2
      - Epic
      - FHIR
      - Legacy
      - SMART on FHIR
    humanURL: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/DSTU2/
    baseURL: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/DSTU2
    description: >-
      The legacy Thomas Jefferson University Hospital DSTU2 FHIR endpoint listed in Epic's public R4 endpoint registry
      under the organization "Jefferson Health". It remains available for backward compatibility with older SMART on
      FHIR apps written against the FHIR DSTU2 baseline that pre-dates the CMS Interoperability and Patient Access
      mandate; new integrations should target the R4 endpoint instead.
    properties:
      - type: Documentation
        url: https://fhir.epic.com/Specifications
      - type: EndpointDirectory
        url: https://open.epic.com/MyApps/EndpointsJson
  - aid: jefferson-health:jhp-patient-access-fhir-api
    name: Jefferson Health Plans Patient Access FHIR API
    tags:
      - CARIN Blue Button
      - CMS Interoperability
      - FHIR
      - Patient Access
      - Payer
      - R4
      - SMART on FHIR
      - Smile CDR
    humanURL: https://smilercdr.healthpartnersplans.com/fhir-request-apps/swagger-ui/
    baseURL: https://smilercdr.healthpartnersplans.com/
    description: >-
      The Jefferson Health Plans (formerly Health Partners Plans) Patient Access FHIR API exposes adjudicated claims,
      encounter data from providers, formulary data, and certain clinical data to JHP members via third-party apps under
      the CMS Interoperability and Patient Access Final Rule (CMS-9115-F). The repository conforms to HL7 FHIR Release
      4.0.1, is powered by Smile CDR, and uses OAuth 2.0 / OpenID Connect for member authentication and authorization,
      with developer registration handled through the JHP SMART on FHIR App Developer Portal.
    properties:
      - type: Documentation
        url: https://www.jeffersonhealthplans.com/home/about-us/interoperability/api-tools/
      - type: DeveloperResources
        url: https://www.jeffersonhealthplans.com/home/about-us/interoperability/developer-resources/
      - type: AuthenticationEndpoints
        url: https://www.jeffersonhealthplans.com/home/about-us/interoperability/authentication-and-data-endpoints/
      - type: AppRegistration
        url: https://appgallery.healthpartnersplans.com/app-gallery/portal/#/login
      - type: APIReference
        url: https://smilercdr.healthpartnersplans.com/fhir-request-apps/swagger-ui/
      - type: SmartConfiguration
        url: https://smilercdr.healthpartnersplans.com/smartauth/well-known/openid-configuration
      - type: ImplementationGuide
        name: HL7 CARIN Consumer Directed Payer Data Exchange (CARIN BB)
        url: https://build.fhir.org/ig/HL7/carin-bb/
      - type: Compliance
        name: CMS-9115-F Interoperability and Patient Access Final Rule
        url: https://www.cms.gov/Regulations-and-Guidance/Guidance/Interoperability/index
      - type: TermsOfService
        url: https://www.jeffersonhealthplans.com/home/about-us/interoperability/terms-of-service.html
  - aid: jefferson-health:jhp-provider-directory-fhir-api
    name: Jefferson Health Plans Provider Directory FHIR API
    tags:
      - CMS Interoperability
      - Da Vinci Plan-Net
      - FHIR
      - Payer
      - Plan-Net
      - Provider Directory
      - Public
      - R4
      - Smile CDR
    humanURL: https://providerfhirapi.healthpartnersplans.com/
    baseURL: https://providerfhirapi.healthpartnersplans.com
    description: >-
      The Jefferson Health Plans Provider Directory FHIR API is a public, unauthenticated HL7 FHIR R4 endpoint powered
      by Smile CDR 2025.02.R04 that surfaces JHP's network of in-network practitioners, organizations, locations,
      healthcare services, and insurance plans for the CMS Interoperability and Patient Access Provider Directory
      requirement. Supported resources are Practitioner, PractitionerRole, Organization, Location, HealthcareService,
      InsurancePlan, and Endpoint, all aligned with the HL7 Da Vinci Payer Data Exchange Plan-Net implementation guide.
    properties:
      - type: CapabilityStatement
        url: https://providerfhirapi.healthpartnersplans.com/metadata
      - type: Documentation
        url: https://www.jeffersonhealthplans.com/home/about-us/interoperability/api-tools/
      - type: ImplementationGuide
        name: HL7 Da Vinci PDEX Plan-Net
        url: https://build.fhir.org/ig/HL7/davinci-pdex-plan-net/
      - type: OpenAPI
        url: openapi/jefferson-health-jhp-provider-directory-fhir-api-openapi.yml
      - type: SpectralRuleset
        url: rules/jefferson-health-jhp-provider-directory-fhir-rules.yml
  - aid: jefferson-health:myjeffersonhealth-mychart
    name: MyJeffersonHealth MyChart Patient Portal
    tags:
      - Epic
      - MyChart
      - Patient Portal
    humanURL: https://my.jeffersonhealth.org/
    baseURL: https://my.jeffersonhealth.org/
    description: >-
      MyJeffersonHealth is the patient-facing Epic MyChart deployment used by Jefferson Health patients to view test
      results, message providers, request prescription renewals, schedule appointments, pay bills, and grant third-party
      patient-access apps consent to retrieve their data through Jefferson's underlying FHIR R4 API. It also
      participates in Epic's MyChart Central, allowing single-login access across participating health systems.
    properties:
