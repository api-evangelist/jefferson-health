description: >-
  Jefferson Health is a multi-state nonprofit academic health system based in Philadelphia, Pennsylvania, operating more
  than 30 hospitals and over 700 care sites across eastern Pennsylvania and southern New Jersey as the clinical arm of
  the broader Jefferson enterprise that also includes Thomas Jefferson University and Jefferson Health Plans (formerly
  Health Partners Plans). Its patient-facing electronic health record runs on Epic and is branded as MyJeffersonHealth /
  MyChart, with a CMS-mandated HL7 FHIR R4 API published at fhir.jefferson.edu/FHIRProxy/api/FHIR/R4 that exposes
  USCDI-aligned clinical resources to third-party patient-access applications via SMART on FHIR and OAuth 2.0. Jefferson
  Health Plans separately exposes CARIN-aligned Patient Access and Da Vinci Plan-Net Provider Directory FHIR APIs
  powered by Smile CDR for its insurance members and the public.
