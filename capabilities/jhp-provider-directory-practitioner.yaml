naftiko: 1.0.0-alpha2
info:
  label: Jefferson Health Plans Provider Directory — Practitioner
  description: Search Practitioner resources in the public Jefferson Health Plans (HPP) Da Vinci Plan-Net FHIR R4 Provider Directory.
  tags:
  - Jefferson Health Plans
  - Plan-Net
  - FHIR
  - Practitioner
  - Provider Directory
  - Public
  created: '2026-05-23'
  modified: '2026-05-23'
binds: []
capability:
  consumes:
  - type: http
    namespace: jhp-provider-directory-practitioner
    baseUri: https://providerfhirapi.healthpartnersplans.com
    description: Public Practitioner search on the Jefferson Health Plans Plan-Net FHIR R4 endpoint. No authentication required.
    resources:
    - name: Practitioner
      path: /Practitioner
      operations:
      - name: searchPractitioner
        method: GET
        description: Search Practitioner by name, family, given.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
        - name: family
          in: query
          type: string
        - name: given
          in: query
          type: string
  exposes:
  - type: rest
    namespace: jhp-provider-directory-practitioner-rest
    port: 8080
    resources:
    - path: /v1/practitioner
      name: practitioner
      operations:
      - method: GET
        name: searchPractitioner
        call: jhp-provider-directory-practitioner.searchPractitioner
        with:
          name: rest.name
          family: rest.family
          given: rest.given
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jhp-provider-directory-practitioner-mcp
    port: 9090
    transport: http
    tools:
    - name: search-practitioner
      description: Search Practitioner in the Jefferson Health Plans public Provider Directory.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jhp-provider-directory-practitioner.searchPractitioner
      with:
        name: tool.name
        family: tool.family
        given: tool.given
