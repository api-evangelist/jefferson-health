naftiko: 1.0.0-alpha2
info:
  label: Thomas Jefferson University Hospital FHIR R4 — Condition
  description: Search Condition resources (problems, diagnoses, health concerns) for a patient on Jefferson Health's Epic FHIR R4 endpoint.
  tags:
  - Jefferson Health
  - Epic
  - FHIR
  - Condition
  - USCDI
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
- namespace: env
  keys:
    JEFFERSON_FHIR_TOKEN: JEFFERSON_FHIR_TOKEN
capability:
  consumes:
  - type: http
    namespace: tjuh-fhir-r4-condition
    baseUri: https://fhir.jefferson.edu/FHIRProxy/api/FHIR/R4
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: searchCondition
        method: GET
        description: Search Condition resources for a patient.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: category
          in: query
          type: string
        - name: clinical-status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.JEFFERSON_FHIR_TOKEN}}'
  exposes:
  - type: rest
    namespace: tjuh-fhir-r4-condition-rest
    port: 8080
    resources:
    - path: /v1/condition
      name: condition
      operations:
      - method: GET
        name: searchCondition
        call: tjuh-fhir-r4-condition.searchCondition
        with:
          patient: rest.patient
          category: rest.category
          clinical-status: rest.clinical-status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tjuh-fhir-r4-condition-mcp
    port: 9090
    transport: http
    tools:
    - name: search-condition
      description: Search Condition on Jefferson Health FHIR R4.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tjuh-fhir-r4-condition.searchCondition
      with:
        patient: tool.patient
        category: tool.category
        clinical-status: tool.clinical-status
